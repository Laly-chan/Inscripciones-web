<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="text/css" rel="stylesheet" href="css/estilo.css" media="screen, print"/>
    <link type="text/css" rel="stylesheet" href="css/estado.css" media="screen, print"/>
    <link type="text/css" rel="stylesheet" href="css/crear.css" media="screen, print"/>
    <title>FCAD - Inscripciones</title>
</head>
<body>
    <header>
        <img id="logo" src="image/Logos-FCAD-01.png" alt="FCAD_logo"/>
        <h1 style="display: inline-block">
            FCAD
        </h1>
        <h1 style="display: inline-block">
            Inscripciones
        </h1>
    </header>

    <nav>
        <label id="dashboard" title="Dashboard" class="navlink">
            <a href="./index.html">Inicio</a>
        </label>
        <label id="estudiante" title="Estudiantes" class="navlink navpressed">
            Creación de inscripción
        </label>
    </nav>

    <main id="themain">
        <h2 id="creartitle" class="crearform" style="margin-bottom: 0;">Nueva Inscripción</h2>

        <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>

        <form id="formulario">
            <div class="crearform">
                <label for="idcur" class="creartext">Debido a falta de tiempo no pude implementar la validación de que exista la ID del curso y del estudiante</label>
            </div>
            <div class="crearform">
                <label for="idcur" class="creartext">ID del curso:</label>
                <input type="text" class="crearinput" id="idcur" required>
            </div>
            <div class="crearform">
                <label for="idest" class="creartext">ID del estudiante:</label>
                <input type="text" class="crearinput" id="idest" required>
            </div>
            <div class="crearform">
                <label for="fechains" class="creartext">Fecha de inscripción:</label>
                <input type="date" class="crearinput" id="fechains" required>
            <div class="crearform">
                <p id="buttonform" class="errmessage">.</p>
                <button id="guardarIns" type="submit" class="saveButton">Crear inscripción</button>
            </div>
        </form> 
    </main>

    <footer>
        :3
    </footer>
    <script type="module" src="java/crear.js"></script>

</body>
</html>
